<svg width="760" height="370" xmlns="http://www.w3.org/2000/svg">
  <style>
    .box { fill:#0d1117; stroke:#58a6ff; stroke-width:2; }
    .text { fill:#c9d1d9; font-family: Inter, sans-serif; font-size:16px; }
    .arrow { fill:none; stroke:#58a6ff; stroke-width:3; marker-end:url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff" />
    </marker>
  </defs>
  <rect x="40" y="40" width="200" height="80" rx="14" class="box" />
  <text x="140" y="70" text-anchor="middle" class="text">React Frontend</text>
  <text x="140" y="95" text-anchor="middle" class="text">(Login, Upload)</text>

  <rect x="280" y="40" width="200" height="80" rx="14" class="box" />
  <text x="380" y="70" text-anchor="middle" class="text">FastAPI Backend</text>
  <text x="380" y="95" text-anchor="middle" class="text">(Prediction API)</text>

  <rect x="520" y="40" width="200" height="80" rx="14" class="box" />
  <text x="620" y="70" text-anchor="middle" class="text">ONNX Runtime</text>
  <text x="620" y="95" text-anchor="middle" class="text">(Fast inference)</text>

  <rect x="280" y="170" width="200" height="80" rx="14" class="box" />
  <text x="380" y="200" text-anchor="middle" class="text">EfficientNetB3</text>
  <text x="380" y="225" text-anchor="middle" class="text">(7-class model)</text>

  <rect x="520" y="170" width="200" height="80" rx="14" class="box" />
  <text x="620" y="200" text-anchor="middle" class="text">MongoDB</text>
  <text x="620" y="225" text-anchor="middle" class="text">(Prediction history)</text>

  <path class="arrow" d="M240,80 L280,80" />
  <path class="arrow" d="M480,80 L520,80" />
  <path class="arrow" d="M380,120 L380,170" />
  <path class="arrow" d="M480,210 L520,210" />
</svg>